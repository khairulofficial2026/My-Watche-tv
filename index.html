<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature IPTV Live</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial;
}

/* HEADER */
header{
    padding:12px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    background:linear-gradient(90deg,#e50914,#111);
}

/* FIXED PLAYER */
.player{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    aspect-ratio:16/9;
    background:black;
    z-index:9999;
}

video{
    width:100%;
    height:100%;
}

/* PUSH CONTENT */
.container{
    padding-top:56.25vw;
}

/* CATEGORY BAR */
.categories{
    display:flex;
    gap:8px;
    padding:8px;
    overflow-x:auto;
    background:#141414;
}

.cat{
    padding:6px 10px;
    background:#2a2a2a;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    font-size:13px;
}

/* SEARCH */
.search-container{
    padding:10px;
}

.search-container input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#2a2a2a;
    color:white;
    outline:none;
}

/* CHANNEL GRID */
.channels{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:8px;
    padding:10px;
}

/* CHANNEL CARD */
.channel{
    background:#1a1a1a;
    padding:12px;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
    transition:0.2s;
}

.channel:hover{
    background:#e50914;
    transform:scale(1.05);
}
</style>
</head>

<body>

<header>🎬 Signature IPTV Live</header>

<div class="player">
    <video id="video" controls autoplay playsinline></video>
</div>

<div class="container">

<!-- CATEGORY -->
<div class="categories">
    <div class="cat" onclick="show('ALL')">ALL</div>
    <div class="cat" onclick="show('MAIN')">MAIN</div>
    <div class="cat" onclick="show('BD')">BD</div>
    <div class="cat" onclick="show('IND')">IND</div>
    <div class="cat" onclick="show('FIFA')">🏆 FIFA WC</div>
</div>

<!-- SEARCH -->
<div class="search-container">
    <input type="text" id="search" placeholder="Search channel...">
</div>

<!-- CHANNEL LIST -->
<div class="channels" id="list"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const video = document.getElementById("video");
let hls;

/* FAST PLAYER */
function play(url){

    if(!url) return;

    if(hls) hls.destroy();

    hls = new Hls({
        enableWorker:true,
        lowLatencyMode:true,
        liveSyncDuration:1,
        liveMaxLatencyDuration:3,
        maxBufferLength:10,
        backBufferLength:0
    });

    hls.loadSource(url);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
        video.play().catch(()=>{});
    });
}

/* SOUND ENABLE ON CLICK */
video.addEventListener("click", ()=>{
    video.muted = false;
});

/* CHANNELS */
const channels = [

/* MAIN */
{name:"T Sports", group:"MAIN", url:"https://tvsen7.aynaott.com/tsportsfhd/index.m3u8"},
{name:"BTV National", group:"MAIN", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/1709.m3u8"},
{name:"BTV News", group:"MAIN", url:"https://tvsen6.aynaott.com/BTVNews/index.m3u8"},

/* BD */
{name:"Somoy TV", group:"BD", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1702/output/index.m3u8"},
{name:"Channel 24", group:"BD", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1703/output/index.m3u8"},
{name:"Jamuna TV", group:"BD", url:"https://tvsen6.aynaott.com/jamunatv/index.m3u8"},
{name:"Ekushey TV", group:"BD", url:"https://ekusheyserver.com/etvlivesn.m3u8"},
{name:"Independent TV", group:"BD", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1704/output/1704.m3u8"},

/* IND */
{name:"Star Plus", group:"IND", url:""},
{name:"Sony TV", group:"IND", url:""},

/* FIFA WC */
{name:"T Sports HD", group:"FIFA", url:"https://tvsen7.aynaott.com/tsportsfhd/index.m3u8"},
{name:"Gazi TV", group:"FIFA", url:"https://tvsen5.aynaott.com/Ravc7gPCZpxk/index.m3u8"}

];

/* RENDER */
function render(data){
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(ch=>{
        let div = document.createElement("div");
        div.className = "channel";
        div.innerHTML = "📺 " + ch.name;
        div.onclick = ()=> play(ch.url);
        list.appendChild(div);
    });
}

/* FILTER */
function show(group){

    if(group === "ALL"){
        render(channels);
        return;
    }

    let filtered = channels.filter(ch => ch.group === group);
    render(filtered);
}

/* SEARCH */
document.getElementById("search").addEventListener("input",(e)=>{
    let val = e.target.value.toLowerCase();

    let filtered = channels.filter(ch =>
        ch.name.toLowerCase().includes(val)
    );

    render(filtered);
});

/* INIT */
show("ALL");
play(channels[0].url);

</script>

</body>
</html>
