<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Pro</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial;
}

/* Header */
header{
    background:#e50914;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

/* Video top */
.player{
    width:100%;
    aspect-ratio:16/9;
    background:black;
}

video{
    width:100%;
    height:100%;
}

/* Channel list bottom */
.channels{
    height:calc(100vh - 16px - 56px - 56vw);
    overflow-y:auto;
    background:#141414;
    padding:10px;
}

/* channel item */
.channel{
    background:#1f1f1f;
    margin-bottom:8px;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
}

.channel:hover{
    background:#e50914;
}

/* mobile fix */
@media(max-width:768px){
    .channels{
        height:auto;
        max-height:40vh;
    }
}
</style>
</head>

<body>

<header>📺 IPTV </header>

<div class="player">
    <video id="video" controls autoplay></video>
</div>

<div class="channels" id="list"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const video = document.getElementById('video');
let hls;

// 📺 Channels
const channels = [
  {name:"Somoy TV", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1702/output/1702-audio_113322_eng=113200-video=1692000.m3u8"},
  {name:"Channel 24", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1703/output/1703-audio_113332_eng=113200-video=1692000.m3u8"},
  {name:"Tom & Jerry", url:"https://live20.bozztv.com/giatvplayout7/giatv-208314/playlist.m3u8"},
  {name:"Independence TV", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1704/output/index.m3u8"},
  {name:"BTV", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8"},
  {name:"Ekhon TV", url:"https://bldcmprod-cdn.toffeelive.com/cdn/live/ekhon_tv/playlist.m3u8"}
];

function play(url){
    if(hls){ hls.destroy(); }

    if(Hls.isSupported()){
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url;
    }
}

// render list
const list = document.getElementById("list");

channels.forEach(ch=>{
    let div = document.createElement("div");
    div.className = "channel";
    div.innerText = "📺 " + ch.name;
    div.onclick = ()=> play(ch.url);
    list.appendChild(div);
});

// auto play first
play(channels[0].url);

</script>

</body>
</html>
