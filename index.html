<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature IPTV Live</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial;
}

/* HEADER */
header{
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    background:linear-gradient(90deg,#e50914,#111);
}

/* PLAYER FIXED TOP */
.player{
    position: sticky;
    top: 0;
    z-index: 999;
    width: 100%;
    aspect-ratio: 16/9;
    background: black;
    box-shadow:0 10px 20px rgba(0,0,0,0.6);
}

video{
    width:100%;
    height:100%;
}

/* CATEGORY */
.categories{
    display:flex;
    gap:10px;
    padding:10px;
    overflow-x:auto;
    background:#141414;
}

.cat{
    padding:8px 12px;
    background:#2a2a2a;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
}

/* SEARCH */
.search-container{
    padding:10px;
}

.search-container input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#2a2a2a;
    color:white;
}

/* GRID */
.channels{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
    gap:10px;
    padding:10px;
}

/* CARD */
.channel{
    background:#1a1a1a;
    padding:12px;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
    transition:0.2s;
}

.channel:hover{
    background:#e50914;
    transform:scale(1.05);
}
</style>
</head>

<body>

<header>🎬 Signature IPTV Live</header>

<div class="player">
    <video id="video" controls autoplay muted playsinline></video>
</div>

<div class="categories">
    <div class="cat" onclick="show('ALL')">ALL</div>
    <div class="cat" onclick="show('BD')">BD</div>
    <div class="cat" onclick="show('MAIN')">MAIN</div>
</div>

<div class="search-container">
    <input type="text" id="search" placeholder="Search channel...">
</div>

<div class="channels" id="list"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const video = document.getElementById("video");
let hls;

/* CHANNELS */
const channels = [

/* BD */
{name:"Somoy TV", group:"BD", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1702/output/index.m3u8"},
{name:"Channel 24", group:"BD", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1703/output/index.m3u8"},
{name:"Channel I", group:"BD", url:"https://tvsen6.aynaott.com/channeli/index.m3u8"},
{name:"Ekushey TV", group:"BD", url:"https://ekusheyserver.com/etvlivesn.m3u8"},
{name:"Jamuna TV", group:"BD", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1701/output/1701-audio_113312_eng=113200-video=1692000.m3u8"},
{name:"Ekattor TV", group:"BD", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1705/output/1705-audio_113352_eng=113200-video=1692000.m3u8"},
{name:"Independent TV", group:"BD", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1704/output/1704-audio_113342_eng=113200-video=1692000.m3u8"},
{name:"Channel 24", group:"BD", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1703/output/1703-audio_113332_eng=113200-video=1692000.m3u8"},
{name:"NTV", group:"BD", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1716/output/1716-audio_113462_eng=113200-video=1692000.m3u8"},
{name:"Dipto TV", group:"BD", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1711/output/1711-audio_113412_eng=113200-video=1692000.m3u8"},

/* MAIN (BTV SEPARATE) */
{name:"T Sports", group:"MAIN", url:"https://tvsen7.aynaott.com/tsportsfhd/index.m3u8"},

{name:"BTV (Main Feed)", group:"MAIN", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/1709-audio_113392_eng=113200-video=1692000.m3u8"},

{name:"BTV NEWS (Separate Feed)", group:"MAIN", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8"},

/* IND */
{name:"Star Plus", group:"IND", url:"https://example.com/ind1.m3u8"},
{name:"Sony TV", group:"IND", url:"https://example.com/ind2.m3u8"}
];

/* PLAY */
function play(url){

    if(hls) hls.destroy();

    hls = new Hls({
        enableWorker:true,
        lowLatencyMode:true,
        backBufferLength:30
    });

    hls.loadSource(url);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
        video.play().catch(()=>{});
    });
}

/* RENDER */
function render(data){
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(ch=>{
        let div = document.createElement("div");
        div.className = "channel";
        div.innerHTML = "📺 " + ch.name;
        div.onclick = ()=> play(ch.url);
        list.appendChild(div);
    });
}

/* FILTER */
function show(group){

    if(group === "ALL"){
        render(channels);
        return;
    }

    let filtered = channels.filter(ch => ch.group === group);
    render(filtered);
}

/* SEARCH */
document.getElementById("search").addEventListener("input",(e)=>{
    let val = e.target.value.toLowerCase();

    let filtered = channels.filter(ch =>
        ch.name.toLowerCase().includes(val)
    );

    render(filtered);
});

/* INIT */
show("ALL");
play(channels[0].url);

</script>

</body>
</html>
