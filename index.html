<style>
body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial;
}

/* HEADER (FIXED) */
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:10000;

    padding:12px;
    text-align:center;
    font-size:20px;
    font-weight:bold;

    background:linear-gradient(90deg,#e50914,#111);
    color:white;
}

/* PLAYER */
.player{
    position:fixed;
    top:50px;
    left:0;
    width:100%;
    aspect-ratio:16/9;
    background:black;
    z-index:9999;
}

video{
    width:100%;
    height:100%;
}

/* CONTENT PUSH */
.container{
    padding-top:calc(56.25vw + 60px);
}

/* CATEGORY */
.categories{
    display:flex;
    gap:8px;
    padding:8px;
    overflow-x:auto;
    background:#141414;
}

.cat{
    padding:6px 10px;
    background:#2a2a2a;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    font-size:13px;
}

/* SEARCH */
.search-container{
    padding:10px;
}

.search-container input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#2a2a2a;
    color:white;
    outline:none;
}

/* CHANNEL GRID */
.channels{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:8px;
    padding:10px;
}

/* CHANNEL CARD */
.channel{
    background:#1a1a1a;
    padding:12px;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
    transition:0.2s;
}

.channel:hover{
    background:#e50914;
    transform:scale(1.05);
}
</style>
</head>

/* PLAY FUNCTION (FIXED) */
function play(url){

    if(!url) return;

    if(hls) hls.destroy();

    if (Hls.isSupported()) {

        hls = new Hls({
            enableWorker:true,
            lowLatencyMode:true,
            backBufferLength:0
        });

        hls.loadSource(url);

        hls.on(Hls.Events.ERROR, function (event, data) {
            console.log("HLS ERROR:", data);
        });

        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
            video.muted = true;
            video.play().catch(()=>{});
        });

    } else {
        video.src = url;
        video.muted = true;
        video.play().catch(()=>{});
    }
}

/* SOUND ON CLICK */
video.addEventListener("click", ()=>{
    video.muted = false;
});

/* RENDER */
function render(data){
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(ch=>{
        let div = document.createElement("div");
        div.className = "channel";
        div.innerHTML = "📺 " + ch.name;
        div.onclick = ()=> play(ch.url);
        list.appendChild(div);
    });
}

/* FILTER */
function show(group){

    if(group === "ALL"){
        render(channels);
        return;
    }

    const filtered = channels.filter(ch => ch.group === group);
    render(filtered);
}

/* SEARCH */
document.getElementById("search").addEventListener("input",(e)=>{
    let val = e.target.value.toLowerCase();

    let filtered = channels.filter(ch =>
        ch.name.toLowerCase().includes(val)
    );

    render(filtered);
});
