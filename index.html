<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature IPTV Live</title>

<style>
body{
    margin:0;
    background: radial-gradient(circle at top, #1a1a1a, #0b0b0b);
    color:white;
    font-family:Arial;
}

/* HEADER */
header{
    padding:15px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    background:linear-gradient(90deg,#e50914,#111);
}

/* smooth title animation */
.sig-title{
    display:inline-block;
    animation: smooth 2.5s ease-in-out infinite;
}

@keyframes smooth{
    0%{transform:translateY(0); opacity:0.9;}
    50%{transform:translateY(-2px); opacity:1;}
    100%{transform:translateY(0); opacity:0.9;}
}

/* PLAYER */
.player{
    width:100%;
    aspect-ratio:16/9;
    background:black;
}

video{
    width:100%;
    height:100%;
}

/* SEARCH */
.search-container{
    padding:10px;
    text-align:center;
}

.search-container input{
    width:90%;
    max-width:500px;
    padding:12px;
    border:none;
    border-radius:25px;
    outline:none;
    background:#2a2a2a;
    color:white;
    transition:0.3s;
}

.search-container input:focus{
    transform:scale(1.03);
    box-shadow:0 0 12px rgba(229,9,20,0.5);
}

/* NETFLIX GRID */
.channels{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
    gap:12px;
    padding:15px;
}

/* CARD */
.channel{
    background:#1a1a1a;
    border-radius:12px;
    padding:15px;
    text-align:center;
    cursor:pointer;
    transition:0.25s;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.channel:hover{
    transform:scale(1.08);
    background:#e50914;
}
</style>
</head>

<body>

<header>
    <span class="sig-title">🎬 Signature IPTV Live</span>
</header>

<div class="player">
    <video id="video" controls autoplay muted playsinline></video>
</div>

<div class="search-container">
    <input type="text" id="search" placeholder="Search channel...">
</div>

<div class="channels" id="list"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const video = document.getElementById("video");
let hls;

/* CHANNEL LIST */
const channels = [
  {name:"Somoy TV", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1702/output/1702-audio_113322_eng=113200-video=1692000.m3u8"},
  {name:"Channel 24", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1703/output/1703-audio_113332_eng=113200-video=1692000.m3u8"},
  {name:"T Sports", url:"https://tvsen7.aynaott.com/tsportsfhd/index.m3u8"},
  {name:"Tom & Jerry", url:"https://live20.bozztv.com/giatvplayout7/giatv-208314/playlist.m3u8"},
  {name:"Independence TV", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1704/output/index.m3u8"},
  {name:"BTV", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8"},
  {name:"Ekhon TV", url:"https://bldcmprod-cdn.toffeelive.com/cdn/live/ekhon_tv/playlist.m3u8"}
];

function play(url){

    if(hls) hls.destroy();

    hls = new Hls({
        enableWorker:true,
        lowLatencyMode:true,
        backBufferLength:30
    });

    hls.loadSource(url);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
        video.play().catch(()=>{});
    });
}

/* render */
function render(data){
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(ch=>{
        let div = document.createElement("div");
        div.className = "channel";
        div.innerHTML = "📺 " + ch.name;
        div.onclick = ()=> play(ch.url);
        list.appendChild(div);
    });
}

/* search */
document.getElementById("search").addEventListener("input",(e)=>{
    let val = e.target.value.toLowerCase();

    let filtered = channels.filter(ch =>
        ch.name.toLowerCase().includes(val)
    );

    render(filtered);
});

/* init */
render(channels);
play(channels[0].url);

</script>

</body>
</html>
