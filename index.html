<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My IPTV</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial;
}

header{
    background:#e60000;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* 16:9 player */
.player{
    width:95%;
    max-width:900px;
    margin:15px auto;
    aspect-ratio:16/9;
    background:black;
}

video{
    width:100%;
    height:100%;
}

/* buttons */
.controls{
    text-align:center;
    margin:10px;
}

button{
    margin:5px;
    padding:10px 15px;
    background:#e60000;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    opacity:0.8;
}
</style>
</head>

<body>

<header>📺 My IPTV Player</header>

<div class="player">
    <video id="video" controls></video>
</div>

<div class="controls">
    <button onclick="playChannel(0)">Channel 1</button>
    <button onclick="playChannel(1)">Channel 2</button>
    <button onclick="playChannel(2)">T Sports</button>
    <button onclick="playChannel(3)">Channel 4</button>
    <button onclick="playChannel(4)">Channel 5</button>
    <button onclick="playChannel(5)">Channel 6</button>
    <button onclick="playChannel(6)">Ekhon TV</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const video = document.getElementById('video');
let hls;

// 👉 তোমার সব channels
const channels = [
  "https://owrcovcrpy.gpcdn.net/bpk-tv/1702/output/1702-audio_113322_eng=113200-video=1692000.m3u8",
  "https://owrcovcrpy.gpcdn.net/bpk-tv/1703/output/1703-audio_113332_eng=113200-video=1692000.m3u8",
  "https://tvsen7.aynaott.com/tsportsfhd/index.m3u8",
  "https://live20.bozztv.com/giatvplayout7/giatv-208314/playlist.m3u8",
  "https://owrcovcrpy.gpcdn.net/bpk-tv/1704/output/index.m3u8",
  "https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8",
  "https://bldcmprod-cdn.toffeelive.com/cdn/live/ekhon_tv/playlist.m3u8"
];

function playChannel(index){

    if(hls){
        hls.destroy();
    }

    const url = channels[index];

    if(Hls.isSupported()){
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url;
    }

}

// auto play first channel
playChannel(0);

</script>

</body>
</html>
